<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Font Awesome CDN -->

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Daisy and Tailwind CDN  -->

    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Font  -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Project Title -->

    <title>GitHub Issue Tracker</title>

    <!-- Internal Css  -->

    <style>
      * {
        font-family: "Geist", sans-serif;
      }

      .active-btn {
        background: #4a00ff !important;
        color: white !important;
        border: none !important;
        transition: all 0.5s ease;
      }
      .inactive-btn {
        background: #e4e4e7 !important;
        color: #64748b !important;
        border: none !important;
        transition: all 0.5s ease;
      }
      .active-btn:hover {
        background: #3407a7 !important;
        color: white !important;
        transform: translateY(-2px) scale(1.03);
      }

      .inactive-btn:hover {
        background: #ceced1 !important;
        color: #64748b !important;
        transform: translateY(-2px) scale(1.03);
      }
      input[type="search"] {
        background-image: url("./assets/mag.png");
        background-repeat: no-repeat;
        background-position: 10px 50%;
        padding-left: 30px;
      }
    </style>
  </head>
  <body id="body" class="bg-[#F8FAFC]">
    <!-- Header Section  -->

    <header class="invisible spin">
      <div class="navbar bg-base-100 shadow-sm lg:px-20">
        <div class="flex-1">
          <div class="flex gap-1 items-center cursor-pointer">
            <img
              src="./assets/github-logo.png"
              alt=""
              class="w-9 hidden md:block"
            />
            <a
              href="#body"
              class="text-[18px] md:text-xl lg:text-2xl font-bold text-[#1F2937]"
              >GitHub Issues Tracker</a
            >
          </div>
        </div>
        <div class="flex gap-2">
          <div class="join">
            <input
              id="input-search"
              type="search"
              placeholder="Search"
              class="input input-bordered focus:outline-none rounded-l-sm focus:border-purple-700 w-24 md:w-auto hidden md:block"
            />
            <div class="">
              <button
                onclick="searchItemInApi()"
                class="btn btn-primary rounded-r-sm hidden md:block"
              >
                <i class="fa-solid fa-search"></i>Search
              </button>
              <button
                onclick="searchItemInApiMobile()"
                class="btn btn-primary rounded-r-sm md:hidden"
              >
                <i class="fa-solid fa-search"></i>Find Issue
              </button>
            </div>
          </div>
          <div class="dropdown dropdown-end md:hidden">
            <div
              tabindex="0"
              role="button"
              class="btn btn-ghost btn-circle avatar"
            >
              <div class="w-10 rounded-full flex items-center justify-center">
                <img
                  src="./assets/github-logo.png"
                  alt=""
                  class="w-8 overflow-x-visible cursor-pointer"
                />
              </div>
            </div>
            <ul
              tabindex="-1"
              class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow"
            >
              <input
                id="mobile-search"
                type="search"
                placeholder="Search"
                class="input focus:border-purple-700 rounded-sm input-bordered focus:outline-none w-full"
              />
            </ul>
          </div>
        </div>
      </div>
    </header>

    <!-- Main Section  -->

    <main
      class="w-full sm:px-6 lg:w-[1110px] lg:px-0 mx-auto mt-4 sm:mt-[60px] invisible spin"
    >
      <!-- Btn container  -->

      <section class="w-full">
        <div
          id="btn-container"
          class="flex justify-start gap-2 bg-white p-6 rounded-lg shadow-md"
        >
          <button
            onclick="toggleBtn('all-btn')"
            id="all-btn"
            class="btn active-btn w-24"
          >
            All
          </button>
          <button
            onclick="toggleBtn('open-btn')"
            id="open-btn"
            class="btn inactive-btn w-24"
          >
            Open
          </button>
          <button
            onclick="toggleBtn('closed-btn')"
            id="closed-btn"
            class="btn inactive-btn w-24"
          >
            Closed
          </button>
        </div>
      </section>

      <!-- Issue section  -->

      <section
        class="flex gap-5 border-2 border-neutral/10 justify-between items-center shadow-lg bg-white p-6 rounded-t-lg mt-4"
      >
        <div class="flex gap-2 items-center">
          <div class="">
            <img src="./assets/Aperture.png" alt="" class="w-[50px]" />
          </div>
          <div class="">
            <div class="flex items-center gap-2">
              <span
                class="text-xl font-semibold text-[#1F2937]"
                data-id="all-count-div"
                id="all-issue"
                >0</span
              >
              <span
                class="hidden text-xl font-semibold text-[#1F2937]"
                data-id="open-count-div"
                id="open-count"
                >0</span
              >
              <span
                class="hidden text-xl font-semibold text-[#1F2937]"
                data-id="closed-count-div"
                id="closed-count"
                >0</span
              >
              <h1 class="text-xl font-semibold text-[#1F2937]">Issues</h1>
            </div>

            <p class="text-base text-[#64748B]">
              Track and manage your project issues
            </p>
          </div>
        </div>

        <div class="md:flex gap-4">
          <div class="flex items-center gap-1">
            <div class="w-3 h-3 rounded-full bg-[#00A96E]"></div>
            <p class="font-medium text-[#1F2937]">Open</p>
          </div>
          <div class="flex items-center gap-1">
            <div class="w-3 h-3 rounded-full bg-[#A855F7]"></div>
            <p class="font-medium text-[#1F2937]">Closed</p>
          </div>
        </div>
      </section>

      <!-- Card section  -->

      <section class="p-4 sm:p-6 bg-[#fbfbfbd9] mx-auto shadow-md hdden">
        <div
          id="card-container"
          class="grid grid-cols-1 mx-auto sm:grid-cols-2 md:grid-cols-3 p-0 lg:grid-cols-4 gap-3"
        ></div>
      </section>
    </main>

    <!-- loading spinner  -->

    <div
      id="spinner-container"
      class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2"
    >
      <span class="loading loading-spinner loading-xl"></span>
    </div>

    <!-- Modal section  -->

    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="display_modal.showModal()">open modal</button> -->

    <dialog id="display_modal" data-id="Modal-container" class="modal"></dialog>

    <!-- Js -->
    <script src="./scripts/dasboard.js"></script>
  </body>
</html>
