<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Font Awesome CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Daisy and Tailwind CDN  -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Project Title -->
    <title>GitHub Issue Tracker</title>

    <!-- Internal Css  -->
    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body class="bg-[#F8FAFC]">
    <!-- Header Section  -->
    <header>
      <div class="navbar bg-base-100 shadow-sm lg:px-20">
        <div class="flex-1">
          <a class="btn btn-ghost text-xl">daisyUI</a>
        </div>
        <div class="flex gap-2">
          <div class="join">
            <input
              type="text"
              placeholder="Search"
              class="input input-bordered w-24 md:w-auto hidden md:block"
            />
            <button class="btn btn-primary">
              <i class="fa-solid fa-plus"></i>New Issue
            </button>
          </div>
          <div class="dropdown dropdown-end md:hidden">
            <div
              tabindex="0"
              role="button"
              class="btn btn-ghost btn-circle avatar"
            >
              <div class="w-10 rounded-full flex items-center justify-center">
                <i class="fa-solid fa-bars"></i>
              </div>
            </div>
            <ul
              tabindex="-1"
              class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow"
            >
              <input
                type="text"
                placeholder="Search"
                class="input input-bordered w-24 md:w-full"
              />
            </ul>
          </div>
        </div>
      </div>
    </header>

    <!-- Main Section  -->
    <main class="w-[1110px] mx-auto mt-[60px]">
      <section class="flex gap-2 bg-white p-6 rounded-lg shadow-md">
        <button class="btn btn-primary w-24">All</button>
        <button class="btn w-24">Primary</button>
        <button class="btn w-24">All</button>
      </section>
    </main>

    <!-- Footer Section  -->
    <footer></footer>

    <!-- Js -->
    <script src="./"></script>
  </body>
</html>
